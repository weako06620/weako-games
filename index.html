<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weako Games — Portail de Jeux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0a0f;
    --bg-card: #12121c;
    --bg-card-hover: #1a1a2e;
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff00aa;
    --neon-green: #39ff14;
    --neon-orange: #ff6a00;
    --neon-purple: #b44aff;
    --text-primary: #e8e8f0;
    --text-muted: #7a7a9a;
    --border-subtle: rgba(255,255,255,0.06);
    --glow-cyan: 0 0 20px rgba(0,240,255,0.3), 0 0 60px rgba(0,240,255,0.1);
    --glow-magenta: 0 0 20px rgba(255,0,170,0.3), 0 0 60px rgba(255,0,170,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ANIMATED BACKGROUND ── */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0% { transform: translate(0,0); }
    100% { transform: translate(60px, 60px); }
  }

  .bg-orbs {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
    animation: orbFloat 12s ease-in-out infinite alternate;
  }
  .orb-1 { width: 500px; height: 500px; background: var(--neon-cyan); top: -10%; left: -5%; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: var(--neon-magenta); bottom: -10%; right: -5%; animation-delay: -4s; }
  .orb-3 { width: 300px; height: 300px; background: var(--neon-purple); top: 50%; left: 50%; animation-delay: -8s; }
  @keyframes orbFloat {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, -30px) scale(1.15); }
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    padding: 50px 40px 30px;
    text-align: center;
  }
  .logo-area {
    display: inline-flex; align-items: center; gap: 16px;
    margin-bottom: 10px;
  }
  .logo-hex {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    animation: logoPulse 3s ease-in-out infinite;
  }
  .logo-hex-inner {
    width: 48px; height: 48px;
    background: var(--bg-deep);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--neon-cyan);
  }
  @keyframes logoPulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(0,240,255,0.4)); }
    50% { filter: drop-shadow(0 0 20px rgba(0,240,255,0.7)); }
  }
  .site-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--neon-cyan), #fff, var(--neon-magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
  }
  .site-subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    color: var(--text-muted);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── NAV / FILTERS ── */
  .filters {
    position: relative; z-index: 10;
    display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;
    padding: 20px 40px 10px;
  }
  .filter-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem; font-weight: 600;
    padding: 8px 22px;
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .filter-btn:hover, .filter-btn.active {
    color: var(--neon-cyan);
    border-color: var(--neon-cyan);
    background: rgba(0,240,255,0.06);
    box-shadow: 0 0 15px rgba(0,240,255,0.1);
  }

  /* ── STATS BAR ── */
  .stats-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
    padding: 25px 40px 10px;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem; font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
  }
  .stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ── GAMES GRID ── */
  .games-section {
    position: relative; z-index: 10;
    padding: 30px 40px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
  }

  /* ── GAME CARD ── */
  .game-card {
    position: relative;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    opacity: 0;
    transform: translateY(30px);
    animation: cardIn 0.6s forwards;
  }
  .game-card:nth-child(1) { animation-delay: 0.1s; }
  .game-card:nth-child(2) { animation-delay: 0.2s; }
  .game-card:nth-child(3) { animation-delay: 0.3s; }
  .game-card:nth-child(4) { animation-delay: 0.4s; }
  .game-card:nth-child(5) { animation-delay: 0.5s; }
  .game-card:nth-child(6) { animation-delay: 0.6s; }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .game-card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: var(--card-accent, var(--neon-cyan));
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px var(--card-glow, rgba(0,240,255,0.15));
  }

  .card-banner {
    position: relative;
    height: 190px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-banner-bg {
    position: absolute; inset: 0;
    background: var(--card-gradient);
    opacity: 0.9;
  }
  .card-banner-pattern {
    position: absolute; inset: 0;
    opacity: 0.08;
  }
  .card-banner-icon {
    position: relative; z-index: 2;
    font-size: 4rem;
    filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
    animation: iconFloat 4s ease-in-out infinite;
  }
  @keyframes iconFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .card-badge {
    position: absolute; top: 14px; left: 14px; z-index: 3;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem; font-weight: 700;
    padding: 3px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .badge-live { background: var(--neon-green); color: #000; }
  .badge-new { background: var(--neon-magenta); color: #fff; }
  .badge-beta { background: var(--neon-orange); color: #000; }
  .badge-soon { background: var(--text-muted); color: #fff; }

  .card-players {
    position: absolute; top: 14px; right: 14px; z-index: 3;
    display: flex; align-items: center; gap: 5px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem; font-weight: 600;
    color: #fff;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .card-body {
    padding: 20px;
  }
  .card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: #fff;
  }
  .card-desc {
    font-size: 0.92rem;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 14px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 16px;
  }
  .tag {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card-footer {
    display: flex; justify-content: space-between; align-items: center;
  }
  .play-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    padding: 8px 24px;
    border: none; border-radius: 8px;
    background: linear-gradient(135deg, var(--card-accent, var(--neon-cyan)), var(--card-accent2, var(--neon-purple)));
    color: #fff;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .play-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px var(--card-glow, rgba(0,240,255,0.3));
  }
  .card-version {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-family: 'Orbitron', sans-serif;
  }

  /* ── CARD THEMES ── */
  .card-aliens {
    --card-accent: #39ff14;
    --card-accent2: #00aa44;
    --card-glow: rgba(57,255,20,0.2);
    --card-gradient: linear-gradient(135deg, #0a2e0a, #1a3a1a, #0d1f0d);
  }
  .card-quiz {
    --card-accent: #ff00aa;
    --card-accent2: #b44aff;
    --card-glow: rgba(255,0,170,0.2);
    --card-gradient: linear-gradient(135deg, #2e0a2e, #1a0a3a, #1f0d2f);
  }
  .card-coming1 {
    --card-accent: #00f0ff;
    --card-accent2: #0077ff;
    --card-glow: rgba(0,240,255,0.2);
    --card-gradient: linear-gradient(135deg, #0a1e2e, #0a1a3a, #0d1a2f);
  }
  .card-coming2 {
    --card-accent: #ff6a00;
    --card-accent2: #ff2200;
    --card-glow: rgba(255,106,0,0.2);
    --card-gradient: linear-gradient(135deg, #2e1a0a, #3a1a0a, #2f1a0d);
  }

  /* ── SCANLINE EFFECT ON BANNER ── */
  .card-banner::after {
    content: '';
    position: absolute; inset: 0; z-index: 1;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* ── FOOTER ── */
  footer {
    position: relative; z-index: 10;
    text-align: center;
    padding: 40px;
    border-top: 1px solid var(--border-subtle);
  }
  .footer-brand {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 3px;
  }
  .footer-brand span {
    color: var(--neon-cyan);
  }
  .footer-links {
    display: flex; justify-content: center; gap: 20px;
    margin-top: 12px;
  }
  .footer-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.3s;
  }
  .footer-links a:hover { color: var(--neon-cyan); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    header { padding: 30px 20px 20px; }
    .games-section { padding: 20px 16px 40px; }
    .games-grid { grid-template-columns: 1fr; gap: 18px; }
    .stats-bar { gap: 24px; }
    .filters { padding: 15px 16px 5px; }
  }

  /* ── EMPTY STATE ── */
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 1.1rem;
  }

  /* ── TUTO BUTTON ── */
  .tuto-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    padding: 8px 16px;
    border: 1px solid var(--neon-cyan);
    border-radius: 8px;
    background: transparent;
    color: var(--neon-cyan);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s;
    text-decoration: none;
  }
  .tuto-btn:hover {
    background: rgba(0,240,255,0.1);
    box-shadow: 0 0 15px rgba(0,240,255,0.2);
  }

  /* ── TUTO MODAL ── */
  .tuto-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .tuto-overlay.active { opacity: 1; pointer-events: all; }

  .tuto-modal {
    background: var(--bg-card);
    border: 1px solid var(--neon-cyan);
    border-radius: 20px;
    width: 90%; max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 30px;
    position: relative;
    box-shadow: 0 0 40px rgba(0,240,255,0.15);
  }
  .tuto-close {
    position: absolute; top: 15px; right: 20px;
    font-size: 1.5rem; color: var(--text-muted);
    cursor: pointer; background: none; border: none;
    transition: color 0.3s;
  }
  .tuto-close:hover { color: var(--neon-cyan); }

  .tuto-step-indicator {
    display: flex; justify-content: center; gap: 8px;
    margin-bottom: 24px;
  }
  .tuto-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--border-subtle);
    transition: all 0.3s;
  }
  .tuto-dot.active {
    background: var(--neon-cyan);
    box-shadow: 0 0 10px rgba(0,240,255,0.5);
    transform: scale(1.3);
  }

  .tuto-step-icon {
    font-size: 3rem;
    text-align: center;
    margin-bottom: 16px;
    animation: iconFloat 3s ease-in-out infinite;
  }
  .tuto-step-img {
    display: block;
    max-width: 220px;
    max-height: 380px;
    margin: 0 auto 18px;
    border-radius: 14px;
    border: 2px solid rgba(0,240,255,0.3);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 20px rgba(0,240,255,0.1);
    object-fit: contain;
  }
  .tuto-step-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    color: #fff; text-align: center;
    margin-bottom: 14px;
  }
  .tuto-step-desc {
    font-size: 0.95rem; color: var(--text-muted);
    line-height: 1.7; text-align: center;
  }
  .tuto-step-desc strong {
    color: var(--neon-green);
  }

  .tuto-nav {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 24px;
  }
  .tuto-nav-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    padding: 8px 20px;
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s;
  }
  .tuto-nav-btn:hover {
    color: var(--neon-cyan);
    border-color: var(--neon-cyan);
  }
  .tuto-nav-btn.primary {
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    color: #fff; border: none;
  }
  .tuto-nav-btn.primary:hover {
    box-shadow: 0 0 20px rgba(0,240,255,0.3);
    transform: scale(1.05);
  }
  .tuto-step-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  /* ── PARTICLE CANVAS ── */
  #particles {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<canvas id="particles"></canvas>

<!-- HEADER -->
<header>
  <div class="logo-area">
    <div class="logo-hex">
      <div class="logo-hex-inner">W</div>
    </div>
  </div>
  <h1 class="site-title">Weako Games</h1>
  <p class="site-subtitle">Portail de jeux par Weako</p>
</header>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-value" id="totalGames">0</div>
    <div class="stat-label">Jeux</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="liveGames">0</div>
    <div class="stat-label">En ligne</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="totalPlayers">0</div>
    <div class="stat-label">Mode multijoueur</div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" data-filter="all">Tous</button>
  <button class="filter-btn" data-filter="multijoueur">Multijoueur</button>
  <button class="filter-btn" data-filter="action">Action</button>
  <button class="filter-btn" data-filter="strategie">Stratégie</button>
</div>

<!-- GAMES -->
<section class="games-section">
  <div class="games-grid" id="gamesGrid"></div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-brand">© 2026 <span>Weako</span> Games</div>
  <div class="footer-links">
    <a href="https://github.com/weako06620" target="_blank">GitHub</a>
  </div>
</footer>

<!-- TUTO MODAL -->
<div class="tuto-overlay" id="tutoOverlay" onclick="if(event.target===this)closeTuto()">
  <div class="tuto-modal">
    <button class="tuto-close" onclick="closeTuto()">✕</button>
    <div class="tuto-step-indicator" id="tutoStepIndicator"></div>
    <div class="tuto-step-title" id="tutoTitle"></div>
    <img class="tuto-step-img" id="tutoImg" src="" alt="Tutorial">
    <div class="tuto-step-desc" id="tutoDesc"></div>
    <div class="tuto-nav">
      <button class="tuto-nav-btn" id="tutoPrev" onclick="tutoNav(-1)">◀ Précédent</button>
      <span class="tuto-step-num" id="tutoNum"></span>
      <button class="tuto-nav-btn primary" id="tutoNext" onclick="tutoNav(1)">Suivant ▶</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  🎮 CONFIGURATION DES JEUX — Ajoute tes jeux ici !
// ═══════════════════════════════════════════════════════════

const GAMES = [
  {
    id: 'aliens-vs-marines',

// ═══════════════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════════════

const grid = document.getElementById('gamesGrid');

function renderGames(filter = 'all') {
  const filtered = filter === 'all'
    ? GAMES
    : GAMES.filter(g => g.tags.includes(filter));

  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">Aucun jeu trouvé dans cette catégorie.</div>';
    return;
  }

  filtered.forEach((game, i) => {
    const card = document.createElement('div');
    card.className = `game-card ${game.theme}`;
    card.style.animationDelay = `${i * 0.1 + 0.1}s`;

    const badgeClass = {
      live: 'badge-live', new: 'badge-new', beta: 'badge-beta', soon: 'badge-soon'
    }[game.badge] || 'badge-soon';

    const badgeLabel = {
      live: '● En ligne', new: '★ Nouveau', beta: '⚡ Bêta', soon: '◌ Bientôt'
    }[game.badge] || 'Bientôt';

    card.innerHTML = `
      <div class="card-banner">
        <div class="card-banner-bg"></div>
        <div class="card-banner-icon">${game.icon}</div>
        <span class="card-badge ${badgeClass}">${badgeLabel}</span>
        ${game.players ? `<span class="card-players">👥 ${game.players}</span>` : ''}
      </div>
      <div class="card-body">
        <h3 class="card-title">${game.title}</h3>
        <p class="card-desc">${game.desc}</p>
        <div class="card-tags">
          ${game.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
        <div class="card-footer">
          ${game.tuto ? `<button class="tuto-btn" onclick="openTuto('${game.id}')">📖 Tuto</button>` : ''}
          <a href="${game.url}" target="_blank" class="play-btn" ${game.badge === 'soon' ? 'style="opacity:0.4;pointer-events:none"' : ''}>
            ${game.badge === 'soon' ? 'Bientôt' : 'Jouer ▶'}
          </a>
          <span class="card-version">${game.version}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// Stats
function updateStats() {
  document.getElementById('totalGames').textContent = GAMES.length;
  document.getElementById('liveGames').textContent = GAMES.filter(g => g.badge === 'live' || g.badge === 'new').length;
  document.getElementById('totalPlayers').textContent = GAMES.filter(g => g.tags.includes('multijoueur')).length;
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGames(btn.dataset.filter);
  });
});

// ═══════════════════════════════════════════════════════════
//  PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedY = -(Math.random() * 0.3 + 0.1);
    this.speedX = (Math.random() - 0.5) * 0.2;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.color = ['0,240,255','255,0,170','180,74,255'][Math.floor(Math.random()*3)];
  }
  update() {
    this.y += this.speedY;
    this.x += this.speedX;
    if (this.y < -10) this.reset(), this.y = canvas.height + 10;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.color},${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < 60; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════

renderGames();
updateStats();

// ═══════════════════════════════════════════════════════════
//  TUTORIAL SYSTEM
// ═══════════════════════════════════════════════════════════

let currentTuto = null;
let currentStep = 0;

function openTuto(gameId) {
  const game = GAMES.find(g => g.id === gameId);
  if (!game || !game.tuto) return;
  currentTuto = game.tuto;
  currentStep = 0;
  renderTutoStep();
  document.getElementById('tutoOverlay').classList.add('active');
}

function closeTuto() {
  document.getElementById('tutoOverlay').classList.remove('active');
  currentTuto = null;
  currentStep = 0;
}

function tutoNav(dir) {
  if (!currentTuto) return;
  currentStep += dir;
  if (currentStep < 0) currentStep = 0;
  if (currentStep >= currentTuto.length) {
    closeTuto();
    const game = GAMES.find(g => g.tuto === currentTuto);
    if (game && game.url) window.open(game.url, '_blank');
    return;
  }
  renderTutoStep();
}

function renderTutoStep() {
  if (!currentTuto) return;
  const step = currentTuto[currentStep];
  const total = currentTuto.length;

  document.getElementById('tutoTitle').textContent = step.title;
  if (step.img) {
    document.getElementById('tutoImg').src = step.img;
    document.getElementById('tutoImg').style.display = 'block';
  } else {
    document.getElementById('tutoImg').style.display = 'none';
  }
  document.getElementById('tutoDesc').innerHTML = step.desc;
  document.getElementById('tutoNum').textContent = `${currentStep + 1} / ${total}`;

  // Dots
  const dots = document.getElementById('tutoStepIndicator');
  dots.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'tuto-dot' + (i === currentStep ? ' active' : '');
    dot.onclick = () => { currentStep = i; renderTutoStep(); };
    dot.style.cursor = 'pointer';
    dots.appendChild(dot);
  }

  // Nav buttons
  document.getElementById('tutoPrev').style.visibility = currentStep === 0 ? 'hidden' : 'visible';
  const nextBtn = document.getElementById('tutoNext');
  nextBtn.textContent = currentStep === total - 1 ? 'Jouer ! 🎮' : 'Suivant ▶';
}

// Counter animation
document.querySelectorAll('.stat-value').forEach(el => {
  const target = parseInt(el.textContent);
  let current = 0;
  const step = () => {
    if (current < target) {
      current++;
      el.textContent = current;
      setTimeout(step, 80);
    }
  };
  el.textContent = '0';
  setTimeout(step, 600);
});
</script>
