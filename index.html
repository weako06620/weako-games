<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>TERRA — Connexion</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#090d16">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="js/config.js"></script>
</head>
<body class="auth-page">

<div id="overlay">
  <div class="spinner"></div>
  <div id="overlay-text">Connexion…</div>
</div>

<div id="screens">

  <!-- ── SCREEN : LOGIN ── -->
  <div class="screen on" id="sc-login">
    <div class="auth-logo">
      <div class="auth-logo-text">TERRA</div>
      <div class="auth-logo-sub">The Earth Resource &amp; Alliance</div>
    </div>
    <div class="auth-card">
      <div class="auth-card-head">
        <div class="auth-card-title">Connexion</div>
        <div class="auth-card-sub">Accédez à votre cité</div>
      </div>
      <div class="auth-card-body">
        <div class="auth-error" id="login-err"></div>
        <button class="btn btn-google" id="btn-google">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.26 12a6.74 6.74 0 0 1 .13-1.34L3.3 9.3A10 10 0 0 0 2 12c0 1.61.38 3.13 1.06 4.48l2.13-1.65A6.74 6.74 0 0 1 5.26 12z"/><path fill="#34A853" d="M12 5.26c1.69 0 3.22.62 4.41 1.64l1.88-1.88A9.93 9.93 0 0 0 12 2c-3.79 0-7.07 2.1-8.7 5.18l2.09 1.62A6.74 6.74 0 0 1 12 5.26z"/><path fill="#FBBC05" d="M12 18.74a6.74 6.74 0 0 1-6.62-5.39l-2.09 1.62C5.07 18 8.3 20 12 20a9.93 9.93 0 0 0 6.41-2.32l-2-1.55A6.7 6.7 0 0 1 12 18.74z"/><path fill="#4285F4" d="M21.94 12c0-.64-.06-1.25-.17-1.84H12v3.5h5.58A4.8 4.8 0 0 1 16.41 16l2 1.55A9.93 9.93 0 0 0 22 12z"/></svg>
          Continuer avec Google
        </button>
        <div class="auth-divider">ou</div>
        <div class="field">
          <label class="input-label" for="login-email">Email</label>
          <input class="input" type="email" id="login-email" placeholder="nom@exemple.com" autocomplete="email">
        </div>
        <div class="field">
          <label class="input-label" for="login-pass">Mot de passe</label>
          <input class="input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-solid-cy btn-submit" id="btn-login">Se connecter</button>
        <div class="auth-footer">
          Pas encore de compte ?
          <button class="auth-link" id="go-register">Créer un compte</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── SCREEN : REGISTER ── -->
  <div class="screen" id="sc-register">
    <div class="auth-logo">
      <div class="auth-logo-text">TERRA</div>
      <div class="auth-logo-sub">Créer un compte</div>
    </div>
    <div class="auth-card">
      <div class="auth-card-head">
        <div class="auth-card-title">Nouveau compte</div>
        <div class="auth-card-sub">Fondez votre cité</div>
      </div>
      <div class="auth-card-body">
        <div class="auth-error" id="reg-err"></div>
        <div class="field">
          <label class="input-label" for="reg-name">Nom du joueur</label>
          <input class="input" type="text" id="reg-name" placeholder="Votre pseudo" autocomplete="username">
        </div>
        <div class="field">
          <label class="input-label" for="reg-email">Email</label>
          <input class="input" type="email" id="reg-email" placeholder="nom@exemple.com" autocomplete="email">
        </div>
        <div class="field">
          <label class="input-label" for="reg-pass">Mot de passe</label>
          <input class="input" type="password" id="reg-pass" placeholder="Min. 6 caractères" autocomplete="new-password">
        </div>
        <button class="btn btn-solid-cy btn-submit" id="btn-register">Créer le compte</button>
        <div class="auth-footer">
          Déjà un compte ?
          <button class="auth-link" id="go-login">Se connecter</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── SCREEN : LOBBY ── -->
  <div class="screen" id="sc-lobby">
    <div class="lobby-header">
      <div class="lobby-avatar" id="lobby-avatar">?</div>
      <div>
        <div class="lobby-name" id="lobby-name">—</div>
        <div class="lobby-email" id="lobby-email">—</div>
      </div>
      <button class="btn btn-ghost lobby-signout" id="btn-signout">Déconnexion</button>
    </div>

    <div class="profile-stats" id="lobby-stats">
      <div class="ps-card"><div class="ps-lbl">Bâtiments</div><div class="ps-val" id="ps-built">0</div></div>
      <div class="ps-card"><div class="ps-lbl">Jours joués</div><div class="ps-val" id="ps-days">0</div></div>
      <div class="ps-card"><div class="ps-lbl">Mondes</div><div class="ps-val" id="ps-worlds">0</div></div>
    </div>

    <div class="slbl" style="margin-top:0">Mes mondes</div>
    <div class="world-list" id="world-list">
      <div class="world-empty">Chargement…</div>
    </div>

    <div class="action-row">
      <button class="btn btn-cy" id="btn-new-world">+ Nouveau monde</button>
      <button class="btn btn-ghost" id="btn-join-world">Rejoindre</button>
    </div>

    <!-- Create world form -->
    <div class="create-form" id="create-form">
      <div class="field" style="margin-bottom:10px">
        <label class="input-label" for="world-name-inp">Nom du monde</label>
        <input class="input" type="text" id="world-name-inp" placeholder="ex: Nouvelle Athènes">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-gn" id="btn-create-confirm" style="flex:1;justify-content:center">Créer</button>
        <button class="btn btn-ghost" id="btn-create-cancel">Annuler</button>
      </div>
    </div>

    <!-- Join form -->
    <div class="join-input-row" id="join-row" style="display:none">
      <input class="input" type="text" id="join-code" placeholder="CODE" maxlength="6">
      <button class="btn btn-cy" id="btn-join-confirm">Rejoindre</button>
      <button class="btn btn-ghost" id="btn-join-cancel">✕</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<!-- Timeout de sécurité indépendant des modules -->
<script>
setTimeout(() => {
  const ov = document.getElementById('overlay');
  if (ov && ov.style.display !== 'none' && !ov.classList.contains('hide')) {
    ov.classList.add('hide');
    setTimeout(() => { ov.style.display = 'none'; }, 350);
    // Afficher l'écran de login
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
    const login = document.getElementById('sc-login');
    if (login) login.classList.add('on');
  }
}, 6000);
</script>

<script type="module">
import { loginEmail, registerEmail, loginGoogle, logout, onAuth,
         getInitials, avatarColor } from './js/auth.js';
import { getProfile, createProfile, getWorld, createWorld, joinWorldByCode, deleteWorld } from './js/db.js';

// ── Helpers ──
const $  = id => document.getElementById(id);
const show = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
};
const showErr = (id, msg) => { const e=$(id); e.textContent=msg; e.classList.add('on'); };
const hideErr = (id) => $(id).classList.remove('on');
function toast(msg, type='') {
  const w=$('toast'); const e=document.createElement('div');
  e.className='toast-item'+(type?' '+type:''); e.textContent=msg;
  w.appendChild(e); setTimeout(()=>e.remove(),3100);
}
function hideOverlay() { $('overlay').classList.add('hide'); setTimeout(()=>$('overlay').style.display='none',350); }
function showOverlay(txt='Chargement…') { $('overlay').style.display='flex'; $('overlay').classList.remove('hide'); $('overlay-text').textContent=txt; }

// ── Auth state ──
let _profile = null;

// Timeout de sécurité : si Firebase ne répond pas en 8s, afficher le login
setTimeout(() => {
  if (document.getElementById('overlay').style.display !== 'none') {
    hideOverlay();
    show('sc-login');
  }
}, 8000);

onAuth(async user => {
  if (!user) {
    hideOverlay();
    show('sc-login');
    return;
  }
  showOverlay('Chargement du profil…');
  // Créer profil si nouveau
  _profile = await getProfile(user.uid);
  if (!_profile) {
    await createProfile(user.uid, { displayName: user.displayName || user.email?.split('@')[0] || 'Joueur', email: user.email });
    _profile = await getProfile(user.uid);
  }
  await renderLobby(user, _profile);
  hideOverlay();
  show('sc-lobby');
});

// ── Lobby render ──
async function renderLobby(user, profile) {
  const name = user.displayName || profile?.displayName || 'Joueur';
  const [c1,c2] = avatarColor(user.uid);
  $('lobby-avatar').textContent = getInitials(name);
  $('lobby-avatar').style.background = `linear-gradient(135deg,${c1},${c2})`;
  $('lobby-name').textContent  = name;
  $('lobby-email').textContent = user.email || '';
  $('ps-built').textContent  = profile?.stats?.totalBuilt  || 0;
  $('ps-days').textContent   = profile?.stats?.totalDays   || 0;
  $('ps-worlds').textContent = (profile?.worlds || []).length;

  // Load worlds
  const worldIds = profile?.worlds || [];
  const wl = $('world-list');
  if (!worldIds.length) { wl.innerHTML = '<div class="world-empty">Aucun monde — créez-en un !</div>'; return; }
  wl.innerHTML = '<div class="world-empty">Chargement des mondes…</div>';
  const worlds = await Promise.all(worldIds.map(id => getWorld(id)));
  wl.innerHTML = '';
  worlds.filter(Boolean).forEach(w => {
    const pc = Object.keys(w.players||{}).length;
    const isOwner = w.createdBy === user.uid;
    const card = document.createElement('div');
    card.className = 'world-card';
    card.style.cssText = 'position:relative;cursor:default;';
    card.innerHTML = `
      <div class="world-card-stripe"></div>
      <div class="world-card-info" style="cursor:pointer" onclick="window.__enterWorld('${w.id}','${user.uid}','${name.replace(/'/g,"\\'")}')">
        <div class="world-card-name">${w.name||'Monde'}</div>
        <div class="world-card-meta">Code : ${w.code} · ${pc}/${w.maxPlayers} joueur(s)</div>
      </div>
      <div class="world-card-badge ${w.status==='active'?'wbadge-active':'wbadge-waiting'}">${w.status==='active'?'Actif':'En attente'}</div>
      ${isOwner ? `<button title="Supprimer ce monde"
        style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:#f87171;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:11px;margin-left:8px;flex-shrink:0;transition:all .15s;"
        onmouseover="this.style.background='rgba(248,113,113,.18)'"
        onmouseout="this.style.background='rgba(248,113,113,.08)'"
        onclick="window.__deleteWorld('${w.id}','${(w.name||'Monde').replace(/'/g,"\\'")}','${user.uid}')">🗑</button>` : ''}`;
    wl.appendChild(card);
  });
}

window.__enterWorld = enterWorld;

// ── Suppression de monde avec confirmation ──
window.__deleteWorld = async (worldId, worldName, uid) => {
  // Modale de confirmation inline
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:#0e1420;border:1px solid rgba(248,113,113,.35);border-radius:12px;padding:24px;max-width:340px;width:90%;text-align:center;">
      <div style="font-size:24px;margin-bottom:10px;">🗑️</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#f1f5f9;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Supprimer ce monde ?</div>
      <div style="font-size:12px;color:#6b85a0;margin-bottom:6px;">« ${worldName} »</div>
      <div style="font-size:11px;color:#f87171;margin-bottom:18px;">Cette action est irréversible. Toutes les cités du monde seront perdues.</div>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button id="del-cancel" style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;padding:8px 20px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#6b85a0;">Annuler</button>
        <button id="del-confirm" style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;padding:8px 20px;border-radius:6px;cursor:pointer;border:1px solid rgba(248,113,113,.4);background:rgba(248,113,113,.12);color:#f87171;">Supprimer définitivement</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#del-cancel').onclick  = () => overlay.remove();
  overlay.querySelector('#del-confirm').onclick = async () => {
    overlay.remove();
    showOverlay('Suppression…');
    try {
      await deleteWorld(worldId, uid);
      toast('Monde supprimé.','w');
      // Recharger le profil et la liste
      const u = (await import('./js/auth.js')).currentUser();
      if (u) {
        const p = await getProfile(u.uid);
        await renderLobby(u, p);
      }
    } catch(e) { toast(e.message,'e'); }
    hideOverlay();
  };
};

function enterWorld(worldId, uid, name) {
  // Passer les infos via sessionStorage et naviguer vers game.html
  sessionStorage.setItem('terra_world', JSON.stringify({ worldId, uid, name }));
  window.location.href = 'game.html';
}

// ── Login ──
$('btn-login').onclick = async () => {
  hideErr('login-err');
  const email = $('login-email').value.trim();
  const pass  = $('login-pass').value;
  if (!email || !pass) { showErr('login-err','Remplissez tous les champs.'); return; }
  showOverlay('Connexion…');
  try { await loginEmail(email, pass); }
  catch(e) { hideOverlay(); showErr('login-err', friendlyError(e.code)); }
};

$('btn-google').onclick = async () => {
  try { await loginGoogle(); }
  catch(e) { showErr('login-err', friendlyError(e.code)); }
};

$('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') $('btn-login').click(); });

// ── Register ──
$('btn-register').onclick = async () => {
  hideErr('reg-err');
  const name  = $('reg-name').value.trim();
  const email = $('reg-email').value.trim();
  const pass  = $('reg-pass').value;
  if (!name||!email||!pass) { showErr('reg-err','Remplissez tous les champs.'); return; }
  if (pass.length < 6)      { showErr('reg-err','Mot de passe min. 6 caractères.'); return; }
  showOverlay('Création du compte…');
  try { await registerEmail(email, pass, name); }
  catch(e) { hideOverlay(); showErr('reg-err', friendlyError(e.code)); }
};

// ── Screen switches ──
$('go-register').onclick  = () => show('sc-register');
$('go-login').onclick     = () => show('sc-login');
$('btn-signout').onclick  = async () => { await logout(); show('sc-login'); };

// ── Create world ──
$('btn-new-world').onclick    = () => { $('create-form').classList.add('on'); $('join-row').style.display='none'; };
$('btn-create-cancel').onclick= () => $('create-form').classList.remove('on');
$('btn-create-confirm').onclick = async () => {
  const worldName = $('world-name-inp').value.trim();
  const user = (await import('./js/auth.js')).currentUser();
  if (!user) return;
  const name = user.displayName || _profile?.displayName || 'Joueur';
  showOverlay('Création du monde…');
  try {
    const { worldId, code } = await createWorld(user.uid, name, worldName);
    toast(`Monde créé ! Code : ${code}`,'g');
    $('create-form').classList.remove('on');
    hideOverlay();
    enterWorld(worldId, user.uid, name);
  } catch(e) { hideOverlay(); toast(e.message,'e'); }
};

// ── Join world ──
$('btn-join-world').onclick   = () => { $('join-row').style.display='flex'; $('create-form').classList.remove('on'); };
$('btn-join-cancel').onclick  = () => $('join-row').style.display='none';
$('btn-join-confirm').onclick = async () => {
  const code = $('join-code').value.trim().toUpperCase();
  if (code.length !== 6) { toast('Code à 6 chiffres requis','e'); return; }
  const user = (await import('./js/auth.js')).currentUser();
  if (!user) return;
  const name = user.displayName || _profile?.displayName || 'Joueur';
  showOverlay('Connexion au monde…');
  try {
    const { worldId } = await joinWorldByCode(user.uid, name, code);
    hideOverlay();
    enterWorld(worldId, user.uid, name);
  } catch(e) { hideOverlay(); toast(e.message,'e'); }
};

// ── Error messages ──
function friendlyError(code) {
  const map = {
    'auth/invalid-email':       'Adresse email invalide.',
    'auth/user-not-found':      'Aucun compte avec cet email.',
    'auth/wrong-password':      'Mot de passe incorrect.',
    'auth/email-already-in-use':'Email déjà utilisé.',
    'auth/weak-password':       'Mot de passe trop faible.',
    'auth/popup-closed-by-user':'Connexion Google annulée.',
    'auth/network-request-failed':'Erreur réseau.',
  };
  return map[code] || 'Erreur : ' + code;
}

// ── PWA ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/terra/sw.js', { scope: '/terra/' })
    .then(reg => console.log('SW enregistré', reg.scope))
    .catch(err => console.warn('SW échec', err));
}
</script>
</body>
</html>
